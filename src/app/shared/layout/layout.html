<mat-sidenav-container class="layout-container">
  <mat-sidenav #sidenav mode="over" class="app-sidenav">
    <mat-nav-list>
      <a mat-list-item (click)="scrollTo('inicio')" [class.active]="currentSection() === 'inicio'">
        <mat-icon>home</mat-icon>
        <span>Inicio</span>
      </a>
      <a mat-list-item (click)="scrollTo('aptitudes')" [class.active]="currentSection() === 'aptitudes'">
        <mat-icon>psychology</mat-icon>
        <span>Aptitudes</span>
      </a>
      <a mat-list-item (click)="scrollTo('curriculum')" [class.active]="currentSection() === 'curriculum'">
        <mat-icon>description</mat-icon>
        <span>Curriculum</span>
      </a>
      <a mat-list-item (click)="scrollTo('proyectos')" [class.active]="currentSection() === 'proyectos'">
        <mat-icon>work</mat-icon>
        <span>Proyectos</span>
      </a>
      <a mat-list-item (click)="scrollTo('experiencia')" [class.active]="currentSection() === 'experiencia'">
        <mat-icon>badge</mat-icon>
        <span>Experiencia</span>
      </a>
      <a mat-list-item (click)="scrollTo('contacto')" [class.active]="currentSection() === 'contacto'">
        <mat-icon>mail</mat-icon>
        <span>Contacto</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar color="primary" class="app-toolbar">
      <div class="toolbar-inner">
        <button mat-icon-button class="menu-btn" (click)="sidenav.toggle()" aria-label="Abrir menú">
          <mat-icon>menu</mat-icon>
        </button>
        <span
          class="brand"
          (click)="scrollTo('inicio')"
          (keydown.enter)="scrollTo('inicio')"
          (keydown.space)="scrollTo('inicio')"
          role="button"
          tabindex="0"
        >
          ArayaDev
        </span>
        <span class="spacer"></span>
        <nav class="nav-links" aria-label="Secciones">
          <a mat-button class="nav-link" (click)="scrollTo('inicio')" [class.active]="currentSection() === 'inicio'">
            Inicio
          </a>
          <a mat-button class="nav-link" (click)="scrollTo('aptitudes')" [class.active]="currentSection() === 'aptitudes'">
            Aptitudes
          </a>
          <a mat-button class="nav-link" (click)="scrollTo('curriculum')" [class.active]="currentSection() === 'curriculum'">
            Curriculum
          </a>
          <a mat-button class="nav-link" (click)="scrollTo('proyectos')" [class.active]="currentSection() === 'proyectos'">
            Proyectos
          </a>
          <a mat-button class="nav-link" (click)="scrollTo('experiencia')" [class.active]="currentSection() === 'experiencia'">
            Experiencia
          </a>
          <a mat-button class="nav-link" (click)="scrollTo('contacto')" [class.active]="currentSection() === 'contacto'">
            Contacto
          </a>
        </nav>
        <button
          mat-icon-button
          class="layout-width-toggle"
          (click)="toggleLayoutWidth()"
          [class.active]="isFullWidth()"
          [attr.aria-label]="isFullWidth() ? 'Usar ancho compacto' : 'Usar ancho completo'"
        >
          <mat-icon aria-hidden="true">{{ isFullWidth() ? 'close_fullscreen' : 'open_in_full' }}</mat-icon>
        </button>
        <button
          mat-icon-button
          class="theme-toggle"
          (click)="toggleTheme()"
          [attr.aria-label]="isDarkTheme() ? 'Cambiar a tema claro' : 'Cambiar a tema oscuro'"
        >
          <mat-icon aria-hidden="true">{{ isDarkTheme() ? 'dark_mode' : 'light_mode' }}</mat-icon>
        </button>
      </div>
    </mat-toolbar>
    <div class="toolbar-offset" aria-hidden="true"></div>
    <div class="scroll-progress" aria-hidden="true"></div>

    <main class="content">
      <section id="inicio" class="section">
        <app-home></app-home>
      </section>

      <section id="aptitudes" class="section">
        <app-skills></app-skills>
      </section>

      <section id="curriculum" class="section">
        <app-resume></app-resume>
      </section>

      <section id="proyectos" class="section">
        <app-projects></app-projects>
      </section>

      <section id="experiencia" class="section">
        <app-experience></app-experience>
      </section>

      <section id="contacto" class="section">
        <app-contact></app-contact>
      </section>
    </main>
    <footer class="footer">
      <span>© {{ currentYear() }} Gonzalo Araya</span>
      <span class="footer-sep">·</span>
      <span>Hecho con Angular</span>
    </footer>
    <button mat-fab color="primary" class="back-to-top" (click)="backToTop()" [class.show]="showBackToTop()" aria-label="Volver arriba">
      <mat-icon>arrow_upward</mat-icon>
    </button>
  </mat-sidenav-content>

</mat-sidenav-container>
